<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFC Construction Viewer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>IFC Construction Viewer</h1>
          <p>Construction staging and sequencing tool</p>
        </div>

        <div class="file-panel">
          <label for="ifcFileInput" class="file-label">Choose IFC File</label>
          <div id="fileName" class="file-name">No file selected</div>
          <input id="ifcFileInput" type="file" accept=".ifc" />
          <button id="loadButton">Load IFC</button>
        </div>

        <div class="status">
          <p><strong>Status:</strong> <span id="statusText">Waiting for file</span></p>
        </div>

        <!-- <div id="selectionInfo">No element selected.</div> -->

        <div class="viewer-actions">
          <button id="hideSelectedButton">Hide Selected</button>
          <button id="isolateSelectedButton">Isolate Selected</button>
          <button id="resetVisibilityButton">Reset Visibility</button>
        </div>


        <button id="toggleMode">Switch to Sequencing</button>

        <div class="staging-panel">
          <h3>Construction Staging</h3>

          <div class="staging-actions">
            <button id="add-stage-button">Add New Stage</button>
            <button id="assign-stage-button">Assign Selection To Current Stage</button>
          </div>

          <div id="staging-timeline" class="staging-timeline is-hidden">
            <label for="stage-slider">Stage Timeline</label>

            <input
              id="stage-slider"
              type="range"
              min="0"
              max="0"
              value="0"
              step="1"
              disabled
            />

            <div id="stage-label">No stages yet.</div>
          </div>

          <div id="stage-summary"></div>
        </div>
      </aside>

      <main class="viewer-area">
        <div class="viewer-top-right-controls">
          <button id="showContextButton" class="viewer-pill-button">
            Show Context
          </button>

          <div class="section-cut-toolbar">
            <div class="section-cut-title">Section Cuts</div>

            <button id="toggleClippingButton" class="viewer-pill-button primary">
              Enter Clipping Mode
            </button>

            <button id="clearClippingButton" class="viewer-pill-button">
              Clear Clipping Planes
            </button>

            <p class="section-cut-hint">
              Double-click model to cut.
            </p>
          </div>
        </div>

        <div id="loadingOverlay" class="loading-overlay is-hidden">
          <div class="loading-card">
            <div class="loading-title">Loading IFC model</div>
            <div id="loadingText" class="loading-text">Preparing file...</div>

            <div class="loading-track">
              <div id="loadingBar" class="loading-bar"></div>
            </div>
          </div>
        </div>

        <div id="viewer-container"></div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
