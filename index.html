<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFC Construction Viewer</title>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <h1>IFC Construction Viewer</h1>

        <label for="ifcFileInput" class="file-label">Choose IFC File</label>
        <input id="ifcFileInput" type="file" accept=".ifc" />

        <button id="loadButton">Load IFC</button>

        <div class="status">
          <p><strong>Status:</strong> <span id="statusText">Waiting for file</span></p>
        </div>

        <div id="selectionInfo">No element selected.</div>


        <div class="viewer-actions">
          <button id="hideSelectedButton">Hide Selected</button>
          <button id="isolateSelectedButton">Isolate Selected</button>
          <button id="resetVisibilityButton">Reset Visibility</button>
        </div>

        <button id="toggleMode">Switch to Sequencing</button>

        <div class="staging-panel">
          <h3>Construction Staging</h3>

          <div class="staging-actions">
            <button id="add-stage-button">Add New Stage</button>
            <button id="assign-stage-button">Assign Selection To Current Stage</button>
            
          </div>

          <div class="staging-timeline">
            <label for="stage-slider">Stage Timeline</label>
            <input
              id="stage-slider"
              type="range"
              min="0"
              max="0"
              value="0"
              step="1"
              disabled
            />
            <div id="stage-label">No stages yet.</div>
          </div>

          <div id="stage-summary"></div>
        </div>

      </aside>

         

      <main class="viewer-area">
        <div id="viewer-container"></div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
