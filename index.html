<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFC Construction Viewer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>IFC Construction Viewer</h1>
          <p>Construction staging and sequencing tool</p>
        </div>

        <div class="file-panel">
          <label for="ifcFileInput" class="file-label">
            Choose IFC File
          </label>

          <div id="fileName" class="file-name">
            No file selected
          </div>

          <input id="ifcFileInput" type="file" accept=".ifc" />

          <button id="loadButton">
            Load IFC
          </button>

          <hr class="panel-divider" />

          <button id="saveProjectButton" disabled>
            Save Project
          </button>

          <hr class="panel-divider" />

          <label for="projectFileInput" class="file-label">
            Open Saved Project
          </label>

          <input id="projectFileInput" type="file" accept=".ifcseq" />
        </div>

        <div class="status">
          <p>
            <strong>Status:</strong>
            <span id="statusText">Waiting for file</span>
          </p>
        </div>

        <!-- <div id="selectionInfo">No element selected.</div> -->

        <button id="toggleMode">
          Switch to Sequencing
        </button>

        <div class="staging-panel">
          <h3>Construction Staging</h3>

          <div class="staging-actions">
            <button id="add-stage-button">
              Add New Stage
            </button>

            <button id="assign-stage-button">
              Assign Selection To Current Stage
            </button>

            <button id="assign-stage-zero-button">
              Assign Selection To Stage 0
            </button>

            <button id="create-lift-button">
              Create Lift
            </button>
          </div>

          <div id="staging-timeline" class="staging-timeline is-hidden">
            <label for="stage-slider">
              Stage Timeline
            </label>

            <input
              id="stage-slider"
              type="range"
              min="0"
              max="0"
              value="0"
              step="1"
              disabled
            />

            <div id="stage-label">
              No stages yet.
            </div>
          </div>

          <div class="stage-actions">
            <button
              id="rename-stage-button"
              type="button"
              class="stage-action-button"
            >
              Rename
            </button>

            <button
              id="clear-stage-button"
              type="button"
              class="stage-action-button"
            >
              Clear
            </button>

            <button
              id="delete-stage-button"
              type="button"
              class="stage-action-button danger"
            >
              Delete
            </button>
          </div>

        <div class="stage-view-actions">
          <button id="save-stage-view-button" type="button">
            Save Current View
          </button>

          <button id="restore-stage-view-button" type="button">
            Restore Saved View
          </button>

          <button id="export-stage-pdf-button" type="button">
            Export Stage PDF
          </button>


          <button id="export-all-stages-pdf-button" type="button">
            Export All Stages PDF
          </button>
        </div>

          <div id="stage-summary"></div>
        </div>
      </aside>

      <main class="viewer-area">
        <div class="viewer-actions">
          <button id="hideSelectedButton">
            Hide Selected
          </button>

          <button id="isolateSelectedButton">
            Isolate Selected
          </button>

          <button
            id="removeSelectedButton"
            title="Removes selected elements from this sequencing project. The original IFC is not modified."
            disabled
          >
            Remove Selected
          </button>

          <button id="restoreRemovedButton" disabled>
            Restore Removed
          </button>

          <button id="resetVisibilityButton">
            Reset Visibility
          </button>
        </div>

        <div class="viewer-top-right-controls">
          <button id="showContextButton" class="viewer-pill-button">
            Show Context
          </button>

          <button id="toggleLiftLabelsButton" type="button" class="secondary-button">
            Show Lift Labels
          </button>

          <div class="manual-elements-toolbar">
            <div class="manual-elements-title">
              Manual Concrete
            </div>

            <button
              id="drawConcreteButton"
              type="button"
              class="viewer-pill-button primary"
              aria-pressed="false"
            >
              Draw Concrete
            </button>

            <label class="manual-elements-label" for="concreteHeightInput">
              Height
            </label>

            <input
              id="concreteHeightInput"
              class="manual-elements-input"
              type="number"
              min="0.1"
              step="0.1"
              value="3"
            />

            <div class="manual-transform-mode" aria-label="Concrete transform mode">
              <button
                type="button"
                class="manual-transform-button is-active"
                data-concrete-transform-mode="move"
                aria-pressed="true"
              >
                Move
              </button>

              <button
                type="button"
                class="manual-transform-button"
                data-concrete-transform-mode="resize"
                aria-pressed="false"
              >
                Resize
              </button>

              <button
                type="button"
                class="manual-transform-button"
                data-concrete-transform-mode="rotate"
                aria-pressed="false"
              >
                Rotate
              </button>

              <button
                type="button"
                class="manual-transform-button"
                data-concrete-transform-mode="snap"
                aria-pressed="false"
              >
                Snap
              </button>
            </div>

            <button
              id="deleteConcreteButton"
              type="button"
              class="viewer-pill-button"
              disabled
            >
              Delete Concrete
            </button>

            <button
              id="snapConcreteButton"
              type="button"
              class="viewer-pill-button"
              aria-pressed="false"
            >
              Snap Off
            </button>
          </div>

          <div class="section-cut-toolbar">
            <div class="section-cut-title">
              Section Cuts
            </div>

            <button
              id="toggleClippingButton"
              class="viewer-pill-button primary"
            >
              Enter Clipping Mode
            </button>

            <button
              id="clearClippingButton"
              class="viewer-pill-button"
            >
              Clear Clipping Planes
            </button>

            <p class="section-cut-hint">
              Double-click model to cut.
            </p>
          </div>

          <div class="grid-toolbar">
            <button
              id="toggleGridsButton"
              type="button"
              class="viewer-pill-button"
              aria-pressed="false"
              disabled
            >
              <span aria-hidden="true">#</span>
              <span>Show Grids</span>
            </button>

            <label class="grid-level-label" for="gridLevelSelect">
              Grid Level
            </label>

            <select
              id="gridLevelSelect"
              class="grid-level-select"
              disabled
            >
              <option value="">Primary grid level</option>
            </select>
          </div>
        </div>

        <div id="loadingOverlay" class="loading-overlay is-hidden">
          <div class="loading-card">
            <div class="loading-title">
              Loading IFC model
            </div>

            <div id="loadingText" class="loading-text">
              Preparing file...
            </div>

            <div class="loading-track">
              <div id="loadingBar" class="loading-bar"></div>
            </div>
          </div>
        </div>

        <div id="viewer-container"></div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
